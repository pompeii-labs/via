name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Pompeii/via
    steps:
      - name: Checkout Via
        uses: actions/checkout@v4
        with:
          path: Pompeii/via

      - name: Checkout Lux
        uses: actions/checkout@v4
        with:
          repository: lux-db/lux
          path: Lux/lux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: Pompeii/via

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="via-${version}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/via" via
          tar -czf "dist/${archive}" via
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: via-${{ matrix.target }}
          path: Pompeii/via/dist/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
