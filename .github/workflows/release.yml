name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pompeii/via
    steps:
      - name: Checkout Via
        uses: actions/checkout@v4
        with:
          path: Pompeii/via

      - name: Checkout Lux
        uses: actions/checkout@v4
        with:
          repository: lux-db/lux
          ref: v0.13.2
          path: Lux/lux

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked --all-targets

  build:
    needs: test
    name: build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: via-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: via-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: via-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: via-macos-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Pompeii/via
    steps:
      - name: Checkout Via
        uses: actions/checkout@v4
        with:
          path: Pompeii/via

      - name: Checkout Lux
        uses: actions/checkout@v4
        with:
          repository: lux-db/lux
          ref: v0.13.2
          path: Lux/lux

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: Pompeii/via

      - name: Build Linux
        if: contains(matrix.target, 'linux-musl')
        run: CC=musl-gcc cargo build --locked --release --target "${{ matrix.target }}"

      - name: Build macOS
        if: "!contains(matrix.target, 'linux-musl')"
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ matrix.artifact }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/via" via
          chmod +x via
          tar -czf "dist/${archive}" via
          (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Pompeii/via/dist/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
