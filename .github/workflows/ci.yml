name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: fmt, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pompeii/via
    steps:
      - name: Checkout Via
        uses: actions/checkout@v4
        with:
          path: Pompeii/via

      - name: Checkout Lux
        uses: actions/checkout@v4
        with:
          repository: lux-db/lux
          path: Lux/lux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Pompeii/via

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked --all-targets

      - name: Build
        run: cargo build --locked --release
